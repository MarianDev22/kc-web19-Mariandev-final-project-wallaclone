name: PR Checks

on:
    pull_request:
        branches:
            - main

permissions:
    contents: read

jobs:
    backend:
        name: Backend setup
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: backend

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: backend/package-lock.json

    frontend:
        name: Frontend setup
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: frontend/wallaclone

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: frontend/wallaclone/package-lock.json
